  - unrar

ai_packages:
  - ollama-rocm

audio_packages:
  - sof-firmware

asus_packages:
  - asusctl
  - rog-control-center

runtime_packages:
  - rustup
  - go

gaming_packages:
  - cachyos-gaming-applications
  - ffmpeg

comm_packages:
  - signal-desktop

desktop_packages:
  - moonlight-qt
  - spotify-launcher

aur_packages:
  - fnm-bin
  - google-chrome
  - wifiman-desktop

comm_aur_packages:
  - zoom

virtualization_packages:
  - dnsmasq
  - edk2-ovmf
  - libvirt
  - qemu-desktop
  - spice-vdagent
  - swtpm
  - virt-manager
  - virt-viewer
  - virtiofsd

security_packages:
  - proton-vpn-gtk-app

security_aur_packages:
  - 1password
  - 1password-cli

# Both-required GPG trust chain that seeds the user keyring so makepkg's
# validpgpkeys check passes when building 1Password from the AUR.
onepassword_gpg_key: "3FEF9748469ADBE15DA7CA80AC2D62742012EA22"
onepassword_gpg_key_url: "https://downloads.1password.com/linux/keys/1password.asc"
onepassword_gpg_key_sha256: "f39e7dd9dedc581ced85732832f217e0de5860a3b80279b5af4bc7c6d8157bae"
onepassword_gpg_key_export_sha256: "130fd029182686f52eb17304615d8377e7787a0d5b01a90db6b36de4e56fb05c"
onepassword_gpg_key_asc_path: "{{ ansible_facts.env.HOME }}/.cache/hanzo/1password.asc"
onepassword_gpg_key_export_path: "{{ ansible_facts.env.HOME }}/.cache/hanzo/1password.gpg"
onepassword_gpg_keyserver: "hkps://keyserver.ubuntu.com"

# ---------------------------------------------------------------------------
# System configuration (roles/system)
# ---------------------------------------------------------------------------

system_groups:
  - docker

# Supplementary groups: system_groups + kernel-managed groups.
user_groups:
  - docker
  - kvm
  - libvirt
  - render
  - video

system_services:
  - docker
  - ollama
  - asusd

# User-scoped systemd services (systemctl --user).
user_services:
  - ssh-agent

system_locale: en_US.UTF-8

# ---------------------------------------------------------------------------
# Dotfiles and Claude configuration (roles/dotfiles)
# ---------------------------------------------------------------------------

dotfiles_repo: https://github.com/palazzem/dotfiles.git
dotfiles_dir: ~/.dotfiles

claude_config_repo: https://github.com/palazzem/claude-config.git
claude_config_dir: ~/.claude

# ---------------------------------------------------------------------------
# GZ302 (ASUS ROG Flow Z13) hardware configuration (roles/hardware)
# ---------------------------------------------------------------------------

# Disable Panel Replay (DC_DISABLE_REPLAY=0x400) on the Strix Halo OLED panel
# to prevent scrolling artifacts and flicker on DCN 3.5.
gz302_oled_kernel_param: "amdgpu.dcdebugmask=0x400"

# Force ABM off: kernel auto-skip on OLED was reverted in 2024; PPD engages
# ABM on battery and causes visible gamma/red-shift on AMD OLED panels.
gz302_amdgpu_abmlevel: 0
# Disable scatter-gather display to prevent flicker on unified-memory APUs under memory pressure.
gz302_amdgpu_sg_display: 0
# Disable Compute Wavefront Save-Restore to prevent GPU hangs on RDNA 3.5.
gz302_amdgpu_cwsr_enable: 0

# ASUS USB identifiers for keyboard, touchpad, and lightbar devices.
gz302_asus_usb_vendor: "0b05"
gz302_asus_keyboard_product: "1a30"
gz302_asus_lightbar_product: "18c6"

# Keyboard hwdb remap: Copilot key -> KEY_PROG1.
# Bound in Hyprland to launch alacritty -e claude.
gz302_keyboard_scancode: "70072"
gz302_keyboard_target_key: prog1

# NetworkManager wifi.powersave for MT7925. NM's default (3 = enabled)
# causes disconnects and throttled throughput on this chip; 2 = disabled is
# the cross-distro workaround (Arch, Fedora, Framework, Z13 communities).
# Trade-off: ~1-2% extra system idle power; does NOT affect suspend (the
# mt7925_pci_suspend driver callback is a separate code path from runtime
# nl80211 PS). 1 = ignore is not a substitute because the mt76 driver
# default is PS-on (the 2023 patch to flip it was rejected upstream).
# Flip back to 3 if a future kernel/firmware combo fixes the regression.
# Values: 0 = use default, 1 = ignore, 2 = disable, 3 = enable.
gz302_wifi_powersave: 2

# ---------------------------------------------------------------------------
# Development tools (roles/devtools, roles/infra)
# ---------------------------------------------------------------------------

uv_tools:
  - ipython
  - pre-commit
  - checkov

infra_packages:
  - terraform

infra_aur_packages:
  - tflint-bin

npm_global_packages:
  - "@anthropic-ai/claude-code"

gopath: ~/programs/go
