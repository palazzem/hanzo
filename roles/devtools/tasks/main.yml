---
# Developer tools — uv CLI tools and npm global packages.

# uv tools: check installed list once, install missing ones.
- name: Check installed uv tools
  ansible.builtin.command: uv tool list
  register: uv_tool_list
  changed_when: false
  failed_when: false
  become: false

# `uv tool list` output format: "toolname vX.Y.Z" per line. We anchor on
# "^toolname " to avoid false matches (e.g. ipython vs. ipython-extra).
# The `when:` gate ensures this only runs when the tool is missing, so
# every actual execution represents a real change — explicit `changed_when: true`
# satisfies ansible-lint's no-changed-when rule.
- name: Install uv tools
  ansible.builtin.command: "uv tool install {{ item }}"
  loop: "{{ uv_tools }}"
  when: >
    uv_tool_list.stdout_lines | default([])
    | select('match', '^' ~ item ~ ' ') | list | length == 0
  changed_when: true
  become: false

# npm global packages via fnm-managed Node.js. Each shell task must
# activate fnm since node/npm is not in the system PATH.
- name: Check installed npm global packages
  ansible.builtin.shell: >
    eval "$(fnm env)" && npm list -g {{ item }} 2>/dev/null
  loop: "{{ npm_global_packages }}"
  register: npm_check
  changed_when: false
  failed_when: false
  become: false

# Loop directly over npm_check.results so item.item is the package name
# and item.rc is that probe's return code (0 = installed).
# Like `Install uv tools`, the `when:` gate ensures this only runs when
# the package is missing, so every actual execution represents a real change.
- name: Install npm global packages
  ansible.builtin.shell: >
    eval "$(fnm env)" && npm install -g {{ item.item }}
  loop: "{{ npm_check.results }}"
  when: item.rc != 0
  changed_when: true
  become: false
