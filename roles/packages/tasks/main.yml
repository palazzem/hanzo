---
# Package installation — official repos (pacman) and AUR (paru).

- name: Install archive tools
  community.general.pacman:
    name: "{{ archive_packages }}"
  become: true

- name: Install audio firmware
  community.general.pacman:
    name: "{{ audio_packages }}"
  become: true

- name: Install ASUS packages
  community.general.pacman:
    name: "{{ asus_packages }}"
  become: true

- name: Install gaming and multimedia
  community.general.pacman:
    name: "{{ gaming_packages }}"
  become: true

- name: Install communication packages
  community.general.pacman:
    name: "{{ comm_packages }}"
  become: true

- name: Install desktop applications
  community.general.pacman:
    name: "{{ desktop_packages }}"
  become: true

# kewlfft.aur.aur accepts a list under `name:`, batching the underlying
# paru invocation. Avoids per-iteration paru startup + AUR DB read cost.
- name: Install AUR packages
  kewlfft.aur.aur:
    name: "{{ aur_packages }}"
    use: paru
  become: false

- name: Install communication AUR packages
  kewlfft.aur.aur:
    name: "{{ comm_aur_packages }}"
    use: paru
  become: false
