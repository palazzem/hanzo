---
# Infrastructure tools — Terraform ecosystem and Google Cloud SDK.

# kewlfft.aur.aur accepts a list under `name:`, batching the underlying
# paru invocation. Avoids per-iteration paru startup + AUR DB read cost.
- name: Install infrastructure AUR packages
  kewlfft.aur.aur:
    name: "{{ infra_aur_packages }}"
    use: paru
  become: false

# Google Cloud SDK ships an installer script. We split download from
# execution so we can: (a) avoid risky-shell-pipe (curl | bash), and
# (b) replace the curl call with get_url (idempotent, retry-aware).
# Cache lives under $HOME (mode 0700) to avoid /tmp symlink-race
# surface and shared-/tmp visibility on multi-user systems.
- name: Download Google Cloud SDK installer
  ansible.builtin.get_url:
    url: https://sdk.cloud.google.com
    dest: "{{ ansible_env.HOME }}/.cache/hanzo/gcloud-installer.sh"
    mode: "0700"
  become: false

# Prompts must be disabled for unattended runs. Install directory
# is ~/.local/share/ rather than ~ to follow XDG conventions.
# Skipped in check mode: get_url doesn't actually download in check
# mode, so the installer script isn't on disk to execute.
- name: Install Google Cloud SDK
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.cache/hanzo/gcloud-installer.sh --disable-prompts --install-dir={{ ansible_env.HOME }}/.local/share"
    creates: "{{ ansible_env.HOME }}/.local/share/google-cloud-sdk"
  when: not ansible_check_mode
  become: false
