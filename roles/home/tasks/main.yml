---
- name: Setup dotfiles repository
  ansible.builtin.include_tasks: git_adopt.yml
  vars:
    git_repo: "{{ home_dotfiles_repo }}"
    git_dest: "{{ home_dotfiles_dir | expanduser }}"

# install.sh is the dotfiles repo's own installer. Re-runnable by design;
# there is no clean change signal, so we mark it unchanged unconditionally.
# Skipped in check mode: the clone above is simulated, so install.sh
# isn't on disk to execute.
- name: Run dotfiles installer
  ansible.builtin.command:
    cmd: "{{ home_dotfiles_dir | expanduser }}/install.sh"
  changed_when: false
  when: not ansible_check_mode
  become: false

- name: Set git user.name
  community.general.git_config:
    name: user.name
    value: "{{ hanzo_fullname }}"
    scope: global
  when: hanzo_fullname is defined
  become: false

- name: Set git user.email
  community.general.git_config:
    name: user.email
    value: "{{ hanzo_email }}"
    scope: global
  when: hanzo_email is defined
  become: false

- name: Setup claude-config repository
  ansible.builtin.include_tasks: git_adopt.yml
  vars:
    git_repo: "{{ home_claude_config_repo }}"
    git_dest: "{{ home_claude_config_dir | expanduser }}"

- name: Detect running systemd
  ansible.builtin.stat:
    path: /run/systemd/system
  register: home_systemd_running
  check_mode: false

# User-scope systemd also needs an active session bus (XDG_RUNTIME_DIR
# is set by pam_systemd on login). The systemd-running check above
# covers most cases; the XDG check covers headless SSH where systemd
# is running system-wide but no user session is set up.
- name: Enable and start user services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: user
  loop: "{{ home_user_services }}"
  when:
    - not ansible_check_mode
    - home_systemd_running.stat.exists
    - "'XDG_RUNTIME_DIR' in ansible_facts['env']"
  become: false
