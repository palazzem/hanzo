---
- name: Provision CachyOS workstation
  hosts: localhost
  connection: local
  become: false
  gather_facts: true
  # Restrict fact gathering to the subsets actually consumed by the
  # roles:
  #   - min:      ansible_facts['user_id'], ansible_facts['env']
  #   - hardware: ansible_facts['product_name'] (from /sys/class/dmi/id)
  #   - virtual:  ansible_facts['virtualization_type'] (container guard)
  # Skipping unused subsets (network, ohai, facter) cuts startup time
  # on every run, especially noticeable in the CI container build.
  gather_subset:
    - "!all"
    - min
    - hardware
    - virtual

  pre_tasks:
    # Identity config is optional: load it only when present so first-run
    # and unattended scenarios work without a pre-existing config file.
    # The home role gates git identity injection on `hanzo_fullname is
    # defined`, so a missing config silently skips injection rather than
    # erroring.
    - name: Check for Hanzo user configuration
      ansible.builtin.stat:
        path: "{{ ansible_facts.env.HOME }}/.config/hanzo/config.yml"
      register: hanzo_config_stat
      tags: [always]

    - name: Load Hanzo user configuration if present
      ansible.builtin.include_vars:
        file: "{{ ansible_facts.env.HOME }}/.config/hanzo/config.yml"
      when: hanzo_config_stat.stat.exists
      tags: [always]

  roles:
    - role: foundation
      tags: [foundation, always]
    - role: packages
      tags: [packages]
    - role: virtualization
      tags: [virtualization]
    - role: containers
      tags: [containers]
    - role: trust
      tags: [trust, always]
    - role: system
      tags: [system, always]
    - role: languages
      tags: [languages]
    - role: tools
      tags: [tools]
    - role: ai
      tags: [ai]
    - role: security
      tags: [security]
    - role: hardware
      tags: [hardware]
    - role: home
      tags: [home]
